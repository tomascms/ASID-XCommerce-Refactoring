# Docker Compose - Scenario A1: 5 Serviços Agregados (Coarse-Grained)
# Este cenário agrupa os 9 serviços em 5 serviços maiores para simular decomposição média
#
# Agregação:
#  1. Auth-Service + User-Service = Auth+User (8081)
#  2. Catalog-Service + Cart-Service = Catalog+Cart (8082)
#  3. Order-Service + Inventory-Service = Order+Inventory (8083)
#  4. Payment-Service + Notification-Service = Payment+Notif (8084)
#  5. API Gateway (9000)
#
# Uso:
#   cd scenario-1-aggregated
#   docker-compose up -d
#   python ../load-scripts/load_test.py --scenario steady --rps 100 --duration 300

version: '3.8'

services:
  # ========== DATABASES ==========
  postgres_auth_user:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_user_db
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_user:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_catalog_cart:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog_cart_db
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_catalog_cart:/var/lib/postgresql/data
    depends_on:
      - postgres_auth_user
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_order_inventory:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_inventory_db
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_order_inventory:/var/lib/postgresql/data
    depends_on:
      - postgres_auth_user
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_payment_notif:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_notif_db
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_payment_notif:/var/lib/postgresql/data
    depends_on:
      - postgres_auth_user
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== MESSAGE BROKER ==========
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== AGGREGATED MICROSERVICES ==========
  
  # Serviço 1: Auth + User (8081)
  auth_user_service:
    image: openjdk:21-jdk-slim
    command: >
      bash -c "
        java -Dspring.application.name=auth-user-service
             -Dspring.datasource.url=jdbc:postgresql://postgres_auth_user:5432/auth_user_db
             -Dspring.datasource.password=postgres
             -Dmanagement.endpoints.web.exposure.include='*'
             -jar /app/auth-service.jar &
        java -Dspring.application.name=user-service
             -Dspring.datasource.url=jdbc:postgresql://postgres_auth_user:5432/auth_user_db
             -Dspring.datasource.password=postgres
             -Dserver.port=8088
             -Dmanagement.endpoints.web.exposure.include='*'
             -jar /app/user-service.jar
      "
    ports:
      - "8081:8080"
      - "8088:8088"
    volumes:
      - ../../02-microservices/auth-service/target:/app/auth-service
      - ../../02-microservices/user-service/target:/app/user-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres_auth_user:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Serviço 2: Catalog + Cart (8082)
  catalog_cart_service:
    image: openjdk:21-jdk-slim
    command: >
      bash -c "
        java -Dspring.application.name=catalog-cart-service
             -Dspring.datasource.url=jdbc:postgresql://postgres_catalog_cart:5432/catalog_cart_db
             -Dspring.datasource.password=postgres
             -Dmanagement.endpoints.web.exposure.include='*'
             -jar /app/catalog-service.jar &
        java -Dspring.application.name=cart-service
             -Dspring.datasource.url=jdbc:postgresql://postgres_catalog_cart:5432/catalog_cart_db
             -Dspring.datasource.password=postgres
             -Dserver.port=8090
             -Dmanagement.endpoints.web.exposure.include='*'
             -jar /app/cart-service.jar
      "
    ports:
      - "8082:8080"
      - "8090:8090"
    volumes:
      - ../../02-microservices/catalog-service/target:/app/catalog-service
      - ../../02-microservices/cart-service/target:/app/cart-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres_catalog_cart:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Serviço 3: Order + Inventory (8083)
  order_inventory_service:
    image: openjdk:21-jdk-slim
    command: >
      bash -c "
        java -Dspring.application.name=order-inventory-service
             -Dspring.datasource.url=jdbc:postgresql://postgres_order_inventory:5432/order_inventory_db
             -Dspring.datasource.password=postgres
             -Dmanagement.endpoints.web.exposure.include='*'
             -jar /app/order-service.jar &
        java -Dspring.application.name=inventory-service
             -Dspring.datasource.url=jdbc:postgresql://postgres_order_inventory:5432/order_inventory_db
             -Dspring.datasource.password=postgres
             -Dserver.port=8091
             -Dmanagement.endpoints.web.exposure.include='*'
             -jar /app/inventory-service.jar
      "
    ports:
      - "8083:8080"
      - "8091:8091"
    volumes:
      - ../../02-microservices/order-service/target:/app/order-service
      - ../../02-microservices/inventory-service/target:/app/inventory-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres_order_inventory:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Serviço 4: Payment + Notification (8084)
  payment_notif_service:
    image: openjdk:21-jdk-slim
    command: >
      bash -c "
        java -Dspring.application.name=payment-notif-service
             -Dspring.datasource.url=jdbc:postgresql://postgres_payment_notif:5432/payment_notif_db
             -Dspring.datasource.password=postgres
             -Dmanagement.endpoints.web.exposure.include='*'
             -jar /app/payment-service.jar &
        java -Dspring.application.name=notification-service
             -Dspring.datasource.url=jdbc:postgresql://postgres_payment_notif:5432/payment_notif_db
             -Dspring.datasource.password=postgres
             -Dserver.port=8092
             -Dmanagement.endpoints.web.exposure.include='*'
             -jar /app/notification-service.jar
      "
    ports:
      - "8084:8080"
      - "8092:8092"
    volumes:
      - ../../02-microservices/payment-service/target:/app/payment-service
      - ../../02-microservices/notification-service/target:/app/notification-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres_payment_notif:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # Serviço 5: API Gateway (9000)
  api_gateway:
    image: openjdk:21-jdk-slim
    command: >
      bash -c "
        java -Dspring.application.name=api-gateway
             -Dspring.cloud.gateway.routes[0].id=auth
             -Dspring.cloud.gateway.routes[0].uri=http://auth_user_service:8080
             -Dspring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
             -Dspring.cloud.gateway.routes[1].id=catalog
             -Dspring.cloud.gateway.routes[1].uri=http://catalog_cart_service:8080
             -Dspring.cloud.gateway.routes[1].predicates[0]=Path=/catalog/**
             -Dmanagement.endpoints.web.exposure.include='*'
             -jar /app/api-gateway.jar
      "
    ports:
      - "9000:8080"
    volumes:
      - ../../02-microservices/api-gateway/target:/app/api-gateway
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - auth_user_service
      - catalog_cart_service
      - order_inventory_service
      - payment_notif_service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ========== MONITORING ==========
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - auth_user_service
      - catalog_cart_service

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_auth_user:
  postgres_catalog_cart:
  postgres_order_inventory:
  postgres_payment_notif:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: xcommerce-aggregated
