# Docker Compose para Scenario 2: 9 Micro-serviços (Atual)
# Mesmo setup que produção, mas com métricas Prometheus para teste
# 
# Uso:
#   cd scenario-2-microservices
#   docker-compose up -d
#   # Esperar 30s para inicializar
#   python ../load-scripts/load_test.py --scenario steady --rps 100 --duration 300
#   docker-compose down

version: '3.8'

services:
  # ========== DATABASES ==========
  postgres_auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_catalog:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_catalog:/var/lib/postgresql/data
    depends_on:
      - postgres_auth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_order:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: order_db
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_order:/var/lib/postgresql/data
    depends_on:
      - postgres_auth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_inventory:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - postgres_inventory:/var/lib/postgresql/data
    depends_on:
      - postgres_auth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres_payment:/var/lib/postgresql/data
    depends_on:
      - postgres_auth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_notification:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - postgres_notification:/var/lib/postgresql/data
    depends_on:
      - postgres_auth
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== MESSAGE BROKER ==========
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions.sh", "--bootstrap-server", "kafka:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # ========== MICROSERVICES (WITH METRICS) ==========
  api-gateway:
    build:
      context: ../../02-microservices/api-gateway
      dockerfile: Dockerfile
    ports:
      - "9000:8080"
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SPRING_CLOUD_GATEWAY_ROUTES_0_ID: auth-service
      SPRING_CLOUD_GATEWAY_ROUTES_0_URI: http://auth-service:8081
      SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0: Path=/auth/**
      SPRING_CLOUD_GATEWAY_ROUTES_1_ID: catalog-service
      SPRING_CLOUD_GATEWAY_ROUTES_1_URI: http://catalog-service:8082
      SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0: Path=/catalog/**
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    labels:
      prometheus: "true"

  auth-service:
    build:
      context: ../../02-microservices/auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      SPRING_APPLICATION_NAME: auth-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_auth:5432/auth_db
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
    depends_on:
      postgres_auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    labels:
      prometheus: "true"

  catalog-service:
    build:
      context: ../../02-microservices/catalog-service
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      SPRING_APPLICATION_NAME: catalog-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_catalog:5432/catalog_db
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
    depends_on:
      postgres_catalog:
        condition: service_healthy
      kafka:
        condition: service_healthy
    labels:
      prometheus: "true"

  cart-service:
    build:
      context: ../../02-microservices/cart-service
      dockerfile: Dockerfile
    ports:
      - "8083:8080"
    environment:
      SPRING_APPLICATION_NAME: cart-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_catalog:5432/catalog_db
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
    depends_on:
      postgres_catalog:
        condition: service_healthy
      kafka:
        condition: service_healthy
    labels:
      prometheus: "true"

  order-service:
    build:
      context: ../../02-microservices/order-service
      dockerfile: Dockerfile
    ports:
      - "8084:8080"
    environment:
      SPRING_APPLICATION_NAME: order-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_order:5432/order_db
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
    depends_on:
      postgres_order:
        condition: service_healthy
      kafka:
        condition: service_healthy
    labels:
      prometheus: "true"

  inventory-service:
    build:
      context: ../../02-microservices/inventory-service
      dockerfile: Dockerfile
    ports:
      - "8085:8080"
    environment:
      SPRING_APPLICATION_NAME: inventory-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_inventory:5432/inventory_db
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
    depends_on:
      postgres_inventory:
        condition: service_healthy
      kafka:
        condition: service_healthy
    labels:
      prometheus: "true"

  payment-service:
    build:
      context: ../../02-microservices/payment-service
      dockerfile: Dockerfile
    ports:
      - "8086:8080"
    environment:
      SPRING_APPLICATION_NAME: payment-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_payment:5432/payment_db
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
    depends_on:
      postgres_payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
    labels:
      prometheus: "true"

  user-service:
    build:
      context: ../../02-microservices/user-service
      dockerfile: Dockerfile
    ports:
      - "8087:8080"
    environment:
      SPRING_APPLICATION_NAME: user-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_auth:5432/auth_db
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
    depends_on:
      postgres_auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    labels:
      prometheus: "true"

  notification-service:
    build:
      context: ../../02-microservices/notification-service
      dockerfile: Dockerfile
    ports:
      - "8088:8080"
    environment:
      SPRING_APPLICATION_NAME: notification-service
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_notification:5432/notification_db
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "*"
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: "true"
    depends_on:
      postgres_notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
    labels:
      prometheus: "true"

  # ========== MONITORING ==========
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api-gateway

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_auth:
  postgres_catalog:
  postgres_order:
  postgres_inventory:
  postgres_payment:
  postgres_notification:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: xcommerce-network
