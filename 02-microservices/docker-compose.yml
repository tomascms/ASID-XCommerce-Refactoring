version: '3.8'
services:
  db:
    image: postgres:latest
    container_name: xcommerce-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - xcommerce-network
    command: >
      sh -c "docker-entrypoint.sh postgres &
      sleep 5;
      psql -U postgres -c 'CREATE DATABASE xcommerce_auth;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_catalog;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_cart;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_inventory;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_orders;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_users;';
      wait"

  auth-service:
    build: ./auth-service
    ports: ["8081:8081"]
    depends_on: [db]
    networks: [xcommerce-network]

  catalog-service:
    build: ./catalog-service
    ports: ["8082:8082"]
    depends_on: [db]
    networks: [xcommerce-network]

  inventory-service:
    build: ./inventory-service
    ports: ["8085:8085"]
    depends_on: [db]
    networks: [xcommerce-network]

  cart-service:
    build: ./cart-service
    ports: ["8083:8083"]
    depends_on: [db]
    networks: [xcommerce-network]

  order-service:
    build: ./order-service
    ports: ["8084:8084"]
    depends_on: [db]
    networks: [xcommerce-network]

  user-service:
    build: ./user-service
    ports: ["8086:8086"]
    depends_on: [db]
    networks: [xcommerce-network]

  payment-service:
    build: ./payment-service
    ports: ["8087:8087"]
    networks: [xcommerce-network]

  notification-service:
    build: ./notification-service
    ports: ["8088:8088"]
    networks: [xcommerce-network]

  gateway:
    build: ./api-gateway
    ports: ["9000:9000"]
    depends_on: 
      - auth-service
      - catalog-service
      - inventory-service
      - cart-service
      - order-service
      - user-service
      - payment-service
      - notification-service
    networks: [xcommerce-network]

networks:
  xcommerce-network:
    driver: bridge