version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: xcommerce-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xcommerce-network
    command: >
      sh -c "docker-entrypoint.sh postgres &
      sleep 10;
      psql -U postgres -c 'CREATE DATABASE xcommerce_auth;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_catalog;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_cart;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_inventory;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_orders;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_users;';
      wait"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: xcommerce-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - xcommerce-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: xcommerce-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_ENABLE_KRAFT: "false" 
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - xcommerce-network

  # --- MICROSERVIÇOS ---
  auth-service:
    build: ./auth-service
    container_name: auth-service
    depends_on:
      db: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [xcommerce-network]

  catalog-service:
    build: ./catalog-service
    container_name: catalog-service
    depends_on:
      db: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [xcommerce-network]

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    depends_on:
      db: { condition: service_healthy }
    networks: [xcommerce-network]

  cart-service:
    build: ./cart-service
    container_name: cart-service
    depends_on:
      db: { condition: service_healthy }
    networks: [xcommerce-network]

  order-service:
    build: ./order-service
    container_name: order-service
    depends_on:
      db: { condition: service_healthy }
      kafka: { condition: service_healthy }
    networks: [xcommerce-network]

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      db: { condition: service_healthy }
    networks: [xcommerce-network]

  payment-service:
    build: ./payment-service
    container_name: payment-service
    depends_on:
      kafka: { condition: service_healthy }
    networks: [xcommerce-network]

  notification-service:
    build: ./notification-service
    container_name: notification-service
    depends_on:
      kafka: { condition: service_healthy }
    networks: [xcommerce-network]

  gateway:
    build: ./api-gateway
    container_name: gateway
    ports: ["9000:9000"]
    depends_on:
      auth-service: { condition: service_started }
    networks: [xcommerce-network]
    environment:
      # CONFIGURAÇÃO DE ROTAS (Substitui o application.yml interno)
      - SPRING_CLOUD_GATEWAY_ROUTES_0_ID=auth-service
      - SPRING_CLOUD_GATEWAY_ROUTES_0_URI=http://auth-service:8081
      - SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0=Path=/auth/**
      
      - SPRING_CLOUD_GATEWAY_ROUTES_1_ID=catalog-service
      - SPRING_CLOUD_GATEWAY_ROUTES_1_URI=http://catalog-service:8082
      - SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0=Path=/products/**

      - SPRING_CLOUD_GATEWAY_ROUTES_2_ID=cart-service
      - SPRING_CLOUD_GATEWAY_ROUTES_2_URI=http://cart-service:8083
      - SPRING_CLOUD_GATEWAY_ROUTES_2_PREDICATES_0=Path=/cart/**

      - SPRING_CLOUD_GATEWAY_ROUTES_3_ID=order-service
      - SPRING_CLOUD_GATEWAY_ROUTES_3_URI=http://order-service:8084
      - SPRING_CLOUD_GATEWAY_ROUTES_3_PREDICATES_0=Path=/order/**

      - SPRING_CLOUD_GATEWAY_ROUTES_4_ID=user-service
      - SPRING_CLOUD_GATEWAY_ROUTES_4_URI=http://user-service:8086
      - SPRING_CLOUD_GATEWAY_ROUTES_4_PREDICATES_0=Path=/users/**

      - SPRING_CLOUD_GATEWAY_ROUTES_5_ID=inventory-service
      - SPRING_CLOUD_GATEWAY_ROUTES_5_URI=http://inventory-service:8085
      - SPRING_CLOUD_GATEWAY_ROUTES_5_PREDICATES_0=Path=/inventory/**

networks:
  xcommerce-network:
    driver: bridge