version: '3.8'
services:
  db:
    image: postgres:latest
    container_name: xcommerce-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    # Este comando cria todas as BDs de uma vez ao iniciar
    command: >
      sh -c "docker-entrypoint.sh postgres &
      sleep 5;
      psql -U postgres -c 'CREATE DATABASE xcommerce_auth;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_catalog;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_cart;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_inventory;';
      psql -U postgres -c 'CREATE DATABASE xcommerce_orders;';
      wait"

  auth-service:
    build: ./auth-service
    ports: ["8082:8082"]
    depends_on: [db]

  catalog-service:
    build: ./catalog-service
    ports: ["8081:8081"]
    depends_on: [db]

  inventory-service:
    build: ./inventory-service
    ports: ["8085:8085"]
    depends_on: [db]

  cart-service:
    build: ./cart-service
    ports: ["8083:8083"]
    depends_on: [db]

  order-service:
    build: ./order-service
    ports: ["8084:8084"]
    depends_on: [db]

  gateway:
    build: ./api-gateway
    ports: ["9000:9000"]
    depends_on: [auth-service, catalog-service, inventory-service, cart-service, order-service]