# Test Database Configuration - H2 In-Memory Database

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Disable Kafka for tests
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.bootstrap-servers=localhost:9092
spring.kafka.consumer.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.auto-offset-reset=earliest

# Disable Flyway for tests (H2 uses DDL auto-create instead)
spring.flyway.enabled=false

# Disable config server for tests
spring.cloud.config.enabled=false

# Use only local mocks in tests; avoid creating the real Feign client beans
spring.cloud.openfeign.enabled=false

# Disable OAuth2 for tests
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/auth/realms/xcommerce
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/auth/realms/xcommerce/protocol/openid-connect/certs

# Disable actuator endpoints that require OAuth2
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
