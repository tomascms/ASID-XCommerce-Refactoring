spring.application.name=user-service
server.port=8086

# Base de Dados
spring.datasource.url=jdbc:postgresql://db-users:5432/xcommerce_users
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Swagger & Gateway Config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
server.forward-headers-strategy=framework

# Kafka Config
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=user-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Spring Cloud Config Disable
spring.cloud.config.enabled=false

# Prometheus, Tracing & Jaeger
management.endpoints.web.exposure.include=health,info,prometheus,tracing
management.endpoint.prometheus.access=UNRESTRICTED
management.otlp.metrics.export.enabled=false
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId:-},spanId=%X{spanId:-}] - %msg%n

# Resilience4j — auth-sync circuit breaker
resilience4j.circuitbreaker.instances.auth-sync.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth-sync.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-sync.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.instances.auth-sync.permitted-number-of-calls-in-half-open-state=3
resilience4j.retry.instances.auth-sync.max-attempts=3
