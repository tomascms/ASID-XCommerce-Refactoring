spring.application.name=auth-service
server.port=8081

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://db-auth:5432/xcommerce_auth
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# OAuth2 Provider (Keycloak) - auth-service is no longer a token issuer
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/xcommerce

# Spring Cloud Config Client - DISABLED
# spring.config.import=configserver:http://config-server:8888
spring.cloud.config.fail-fast=false
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.enabled=false

# Kafka for Event Publishing
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.consumer.group-id=auth-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Management & Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# OpenTelemetry Tracing
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.tracing.sampling.probability=1.0

# Logging
logging.level.root=INFO
logging.level.com.xcommerce=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId:-},spanId=%X{spanId:-}] - %msg%n

# Swagger & Gateway Config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.forward-headers-strategy=framework

# Prometheus Config
management.endpoint.prometheus.access=UNRESTRICTED
management.otlp.metrics.export.enabled=false
