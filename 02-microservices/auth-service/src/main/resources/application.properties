spring.application.name=auth-service
server.port=8081

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://db:5432/xcommerce_auth
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration
jwt.secret=xcommerce_super_secret_jwt_key_2024_please_change_in_production_environment_very_long_key
jwt.expiration=86400000

# OAuth2 Provider (Keycloak) - This service works WITH Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/xcommerce
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://keycloak:8080/realms/xcommerce/protocol/openid-connect/certs

# Spring Cloud Config Client - DISABLED
# spring.config.import=configserver:http://config-server:8888
spring.cloud.config.fail-fast=false
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-attempts=6
spring.cloud.config.enabled=false

# Kafka for Event Publishing
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Management & Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# OpenTelemetry Tracing
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.tracing.sampling.probability=1.0

# Logging
logging.level.root=INFO
logging.level.com.xcommerce=DEBUG
logging.level.org.springframework.security=DEBUG

# Swagger & Gateway Config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.forward-headers-strategy=framework

# Prometheus Config
management.endpoint.prometheus.access=UNRESTRICTED
management.otlp.metrics.export.enabled=false
