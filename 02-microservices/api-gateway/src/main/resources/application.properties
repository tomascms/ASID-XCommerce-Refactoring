server.port=9000
spring.application.name=api-gateway

# Gateway debug logging
logging.level.org.springframework.cloud.gateway=DEBUG

# Compatibilidade com Spring Boot 4
spring.main.allow-bean-definition-overriding=true
management.health.netty.enabled=false
management.endpoint.gateway.enabled=true
management.endpoints.web.exposure.include=health,info,gateway

# --- ROTAS DOS MICROSERVIÇOS ---

# 0. Catalog Service
spring.cloud.gateway.routes[0].id=catalog-service
spring.cloud.gateway.routes[0].uri=http://catalog-service:8082
spring.cloud.gateway.routes[0].predicates[0]=Path=/products/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# 1. Auth Service
spring.cloud.gateway.routes[1].id=auth-service
spring.cloud.gateway.routes[1].uri=http://auth-service:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# 2. Cart Service
spring.cloud.gateway.routes[2].id=cart-service
spring.cloud.gateway.routes[2].uri=http://cart-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/cart/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

# 3. Order Service
spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=http://order-service:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/order/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1

# 4. Inventory Service
spring.cloud.gateway.routes[4].id=inventory-service
spring.cloud.gateway.routes[4].uri=http://inventory-service:8085
spring.cloud.gateway.routes[4].predicates[0]=Path=/inventory/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1

# 5. User Service
spring.cloud.gateway.routes[5].id=user-service
spring.cloud.gateway.routes[5].uri=http://user-service:8086
spring.cloud.gateway.routes[5].predicates[0]=Path=/users/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1

# 6. Payment Service
spring.cloud.gateway.routes[6].id=payment-service
spring.cloud.gateway.routes[6].uri=http://payment-service:8087
spring.cloud.gateway.routes[6].predicates[0]=Path=/payments/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=1

# 7. Notification Service
spring.cloud.gateway.routes[7].id=notification-service
spring.cloud.gateway.routes[7].uri=http://notification-service:8088
spring.cloud.gateway.routes[7].predicates[0]=Path=/notifications/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=1

# --- CONFIGURAÇÃO DO SWAGGER (AGGREGATION) ---
springdoc.swagger-ui.urls[0].name=Catalog Service
springdoc.swagger-ui.urls[0].url=/products/v3/api-docs
springdoc.swagger-ui.urls[1].name=Auth Service
springdoc.swagger-ui.urls[1].url=/auth/v3/api-docs
springdoc.swagger-ui.urls[2].name=Cart Service
springdoc.swagger-ui.urls[2].url=/cart/v3/api-docs
springdoc.swagger-ui.urls[3].name=Order Service
springdoc.swagger-ui.urls[3].url=/order/v3/api-docs
springdoc.swagger-ui.urls[4].name=Inventory Service
springdoc.swagger-ui.urls[4].url=/inventory/v3/api-docs
springdoc.swagger-ui.urls[5].name=User Service
springdoc.swagger-ui.urls[5].url=/users/v3/api-docs
springdoc.swagger-ui.urls[6].name=Payment Service
springdoc.swagger-ui.urls[6].url=/payments/v3/api-docs
springdoc.swagger-ui.urls[7].name=Notification Service
springdoc.swagger-ui.urls[7].url=/notifications/v3/api-docs