server.port=9000
spring.application.name=api-gateway

# 1. Rota para o Catalog Service (Micro-serviço na 8082)
spring.cloud.gateway.server.webflux.routes[0].id=catalog-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/products/**

# 2. Rota para o Auth Service (Micro-serviço na 8081)
spring.cloud.gateway.server.webflux.routes[1].id=auth-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/auth/**

# 3. Rota para o Cart Service (Micro-serviço na 8083)
spring.cloud.gateway.server.webflux.routes[2].id=cart-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/cart-service/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1

# 4. Rota para o Monólito (O sistema antigo na 8080)
spring.cloud.gateway.server.webflux.routes[3].id=xcommerce-monolith
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8080
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/**

# 5. Rota para a Order Service (Micro-serviço na 8084)
spring.cloud.gateway.server.webflux.routes[4].id=order-service
spring.cloud.gateway.server.webflux.routes[4].uri=http://localhost:8084
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/order/**