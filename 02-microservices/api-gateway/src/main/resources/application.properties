server.port=9000
spring.application.name=api-gateway

# Gateway debug logging
logging.level.org.springframework.cloud.gateway=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId:-},spanId=%X{spanId:-}] - %msg%n

# Compatibilidade com Spring Boot 4
spring.main.allow-bean-definition-overriding=true
management.endpoint.gateway.access=UNRESTRICTED

# Prometheus & Tracing
management.endpoints.web.exposure.include=health,info,gateway,prometheus,tracing
management.endpoint.prometheus.access=UNRESTRICTED
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
spring.cloud.gateway.server.webflux.httpclient.connect-timeout=2000
spring.cloud.gateway.server.webflux.httpclient.response-timeout=5s

# JWT — partilha o segredo com identity-service (HS256)
jwt.secret=xcommerce-secret-key-please-rotate-in-production

# Spring Cloud Config — desativado
spring.cloud.config.enabled=false
spring.cloud.config.fail-fast=false

# Circuit breakers — timeouts por rota
resilience4j.timelimiter.instances.identity-auth-cb.timeout-duration=5s
resilience4j.timelimiter.instances.identity-users-cb.timeout-duration=5s
resilience4j.timelimiter.instances.catalog-gateway-cb.timeout-duration=5s
resilience4j.timelimiter.instances.catalog-brand-gateway-cb.timeout-duration=5s
resilience4j.timelimiter.instances.catalog-category-gateway-cb.timeout-duration=5s
resilience4j.timelimiter.instances.cart-gateway-cb.timeout-duration=5s
resilience4j.timelimiter.instances.order-gateway-cb.timeout-duration=5s
resilience4j.timelimiter.instances.inventory-gateway-cb.timeout-duration=5s
resilience4j.timelimiter.instances.notification-gateway-cb.timeout-duration=5s

# --- SWAGGER/OPENAPI AGGREGATION ---
springdoc.swagger-ui.urls[0].name=Identity Service
springdoc.swagger-ui.urls[0].url=/docs/identity
springdoc.swagger-ui.urls[1].name=Catalog Service
springdoc.swagger-ui.urls[1].url=/docs/catalog
springdoc.swagger-ui.urls[2].name=Cart Service
springdoc.swagger-ui.urls[2].url=/docs/cart
springdoc.swagger-ui.urls[3].name=Order Service
springdoc.swagger-ui.urls[3].url=/docs/order
springdoc.swagger-ui.urls[4].name=Inventory Service
springdoc.swagger-ui.urls[4].url=/docs/inventory
springdoc.swagger-ui.urls[5].name=Notification Service
springdoc.swagger-ui.urls[5].url=/docs/notifications
