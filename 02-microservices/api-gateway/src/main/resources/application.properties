server.port=9000
spring.application.name=api-gateway

# 1. Catalog Service
spring.cloud.gateway.server.webflux.routes[0].id=catalog-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://catalog-service:8082
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/products/**

# 2. Auth Service
spring.cloud.gateway.server.webflux.routes[1].id=auth-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://auth-service:8081
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/auth/**

# 3. Cart Service
spring.cloud.gateway.server.webflux.routes[2].id=cart-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://cart-service:8083
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/cart/**

# 4. Order Service
spring.cloud.gateway.server.webflux.routes[3].id=order-service
spring.cloud.gateway.server.webflux.routes[3].uri=http://order-service:8084
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/order/**
