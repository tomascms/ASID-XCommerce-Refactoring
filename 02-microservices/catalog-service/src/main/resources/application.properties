spring.application.name=catalog-service
server.port=8082

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://db:5432/xcommerce_catalog
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernatespring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway Database Versioning
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# OAuth2 Resource Server (Keycloak)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/realms/xcommerce

# Spring Cloud Config - DISABLED
# spring.config.import=configserver:http://config-server:8888
spring.cloud.config.fail-fast=false

# Kafka
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Monitoring
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces

logging.level.com.xcommerce=DEBUG

# Swagger & Gateway Config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
server.forward-headers-strategy=framework

# Spring Cloud Config Disable
spring.cloud.config.import-check.enabled=false

# Prometheus, Tracing & Jaeger
management.endpoints.web.exposure.include=health,info,prometheus,tracing
management.endpoint.prometheus.access=UNRESTRICTED
management.otlp.metrics.export.enabled=false
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.opentelemetry.tracing.export.otlp.endpoint=http://jaeger:4318/v1/traces
