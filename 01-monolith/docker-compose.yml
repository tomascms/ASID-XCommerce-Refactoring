version: '3.8'

# Monólito XCommerce — portas deslocadas para não conflituar com microserviços
# App:      http://localhost:18080
# Postgres: localhost:15432
# Redis:    localhost:16379

services:
  monolith-db:
    image: postgres:15-alpine
    container_name: monolith-db
    environment:
      POSTGRES_DB: xcommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [monolith-network]

  monolith-redis:
    image: redis:7-alpine
    container_name: monolith-redis
    ports:
      - "16379:6379"
    networks: [monolith-network]

  monolith-app:
    build:
      context: ./xcommerce-monolithic-master/final
      dockerfile: Dockerfile.run
    container_name: monolith-app
    ports:
      - "18080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://monolith-db:5432/xcommerce
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_REDIS_HOST: monolith-redis
      SPRING_REDIS_PORT: 6379
      SERVER_PORT: 8080
    depends_on:
      monolith-db: { condition: service_healthy }
    networks: [monolith-network]

networks:
  monolith-network:
    driver: bridge
