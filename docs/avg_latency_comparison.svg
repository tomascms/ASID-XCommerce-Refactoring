<?xml version="1.0" encoding="UTF-8"?>
<svg width="700" height="320" viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg">
  <style> .label{font:12px sans-serif; fill:#222} .legend{font:12px sans-serif;} </style>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="20" y="24" class="label" style="font-weight:700;">Avg Latency Comparison (ms)</text>

  <!-- grid -->
  <g stroke="#eee" stroke-width="1">
    <line x1="100" x2="660" y1="40" y2="40"/>
    <line x1="100" x2="660" y1="100" y2="100"/>
    <line x1="100" x2="660" y1="160" y2="160"/>
    <line x1="100" x2="660" y1="220" y2="220"/>
    <line x1="100" x2="660" y1="280" y2="280"/>
  </g>

  <!-- y labels -->
  <g class="label" fill="#666">
    <text x="60" y="44">600</text>
    <text x="60" y="104">450</text>
    <text x="60" y="164">300</text>
    <text x="60" y="224">150</text>
    <text x="60" y="284">0</text>
  </g>

  <!-- Bars scale: max ~600ms (scale factor 0.4167 for 250px height) -->
  <!-- Groups at x: 160 (GET), 320 (POST), 480 (Workflow) -->

  <!-- GET: Monolith 18.4, Microservices 52.8 -->
  <rect x="150" y="276" width="36" height="-7" fill="#4CAF50" />
  <rect x="192" y="270" width="36" height="-22" fill="#2196F3" />
  <text x="150" y="298" class="label">GET</text>
  <text x="150" y="268" class="label">Mon: 18.4ms</text>
  <text x="192" y="260" class="label">Micro: 52.8ms</text>

  <!-- POST: Monolith 128.4, Microservices 287.7 -->
  <rect x="310" y="224" width="36" height="-85" fill="#4CAF50" />
  <rect x="352" y="136" width="36" height="-173" fill="#2196F3" />
  <text x="310" y="298" class="label">POST</text>
  <text x="310" y="214" class="label">Mon: 128.4ms</text>
  <text x="352" y="126" class="label">Micro: 287.7ms</text>

  <!-- Workflow: Monolith 342.6, Microservices 568.5 -->
  <rect x="470" y="92" width="36" height="-188" fill="#4CAF50" />
  <rect x="512" y="4" width="36" height="-264" fill="#2196F3" />
  <text x="470" y="298" class="label">Workflow</text>
  <text x="470" y="86" class="label">Mon: 342.6ms</text>
  <text x="512" y="-6" class="label">Micro: 568.5ms</text>

  <!-- Legend -->
  <rect x="100" y="20" width="12" height="12" fill="#4CAF50"/>
  <text x="118" y="30" class="legend">Monolith</text>
  <rect x="200" y="20" width="12" height="12" fill="#2196F3"/>
  <text x="218" y="30" class="legend">Microservices</text>

</svg>